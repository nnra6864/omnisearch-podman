services:
    omnisearch:
        image: localhost/omnisearch:latest
        container_name: omnisearch
        network_mode: "pasta"
        ports:
            - "8087:8087/tcp"
        volumes:
            - ./omnisearch:/etc/omnisearch
            - ./omnisearch_cache:/var/cache/omnisearch
        restart: always
        env_file:
            - .env
